<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endroid Notes</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- SEO Meta Tags -->
  <meta name="description" content="Endroid Notes is a beautiful, offline-first note-taking app with Material You 3 amber theming, live Markdown preview, and swipe-to-delete. Perfect for quick thoughts.">
  <meta name="keywords" content="notes app, note taking, offline notes, PWA notes, markdown preview, dark mode, Material You 3, amber theme">
  <meta name="author" content="Endroid">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#FABD00">
  <meta name="msapplication-TileColor" content="#FABD00">
  <meta name="application-name" content="Endroid Notes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Endroid Notes">
  <meta name="format-detection" content="telephone=no">
  <meta property="og:site_name" content="Endroid Notes">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">

  <!-- Social Media Sharing Meta Tags (Open Graph) -->
  <meta property="og:title" content="Endroid Notes - Simple, Beautiful Note-Taking App with Amber Theme">
  <meta property="og:description" content="Endroid Notes is a minimalist, offline-first note-taking app with dark/light themes, live preview, and swipe-to-delete. Perfect for quick thoughts and ideas.">
  <meta property="og:url" content="https://endroid.pages.dev/Notes">
  <meta property="og:image" content="https://endroid.pages.dev/icon.svg">
  <meta property="og:image:alt" content="Endroid Notes App Icon with Amber Theme">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:image:type" content="image/svg+xml">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@endroidnotes">
  <meta name="twitter:creator" content="@endroidnotes">
  <meta name="twitter:title" content="Endroid Notes - Material You 3 Expressive Amber Theme">
  <meta name="twitter:description" content="Experience emotional design with dynamic amber theming. Offline-first, swipe-to-delete, and live Markdown preview.">
  <meta name="twitter:image" content="icon.png">
  <meta name="twitter:image:alt" content="Endroid Notes App Icon">

  <!-- PWA: Favicon & Manifest -->
  <link rel="icon" href="icon.png" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">

  <!-- Service Worker Meta -->
  <meta name="service-worker" content="service-worker.js">

  <style>
    /* --- MATERIAL YOU 3 COLOR PALETTE --- */
    /* Seed Color: 0xFFFFC107 (Amber) */
    
    :root {
      /* Dark theme (default) */
      --primary: #FABD00;
      --on-primary: #3F2E00;
      --primary-container: #5B4300;
      --on-primary-container: #FFDF9E;
      --inverse-primary: #785900;
      
      --secondary: #D7C68D;
      --on-secondary: #3A3005;
      --secondary-container: #52461A;
      --on-secondary-container: #F4E2A7;
      
      --background: #191306;
      --on-background: #EFE1CA;
      --surface: #191306;
      --on-surface: #EFE1CA;
      --surface-variant: #504631;
      --on-surface-variant: #D4C5AA;
      
      --error: #FFB4AB;
      --on-error: #690005;
      --error-container: #93000A;
      --on-error-container: #FFDAD6;
      
      --surface-container: #262011;
      --surface-container-high: #312A1B;
      --surface-container-highest: #3D3525;
      
      --danger: #FFB4AB;
      
      --text-muted: rgba(255,255,255,0.6);
      --radius: 24px;
      --shadow: 0 8px 32px rgba(0,0,0,0.25);
      --motion: 300ms ease;
    }

    /* Light theme */
    [data-theme="light"] {
      --primary: #735600;
      --on-primary: #FFFFFF;
      --primary-container: #F8BB00;
      --on-primary-container: #5B4300;
      --inverse-primary: #FABD00;
      
      --secondary: #665A2B;
      --on-secondary: #FFFFFF;
      --secondary-container: #D5C48C;
      --on-secondary-container: #52461A;
      
      --background: #FFF8F2;
      --on-background: #211B0D;
      --surface: #FFF8F2;
      --on-surface: #211B0D;
      --surface-variant: #F1E1C5;
      --on-surface-variant: #504631;
      
      --error: #B41517;
      --on-error: #FFFFFF;
      --error-container: #FFB1A8;
      --on-error-container: #93000A;
      
      --surface-container: #FAECD4;
      --surface-container-high: #F3E5CE;
      --surface-container-highest: #EDDFC8;
      
      --danger: #B41517;
      
      --text-muted: rgba(0,0,0,0.6);
      --shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    * { 
      margin:0; 
      padding:0; 
      box-sizing:border-box; 
    }
    
    body {
      font-family: 'Roboto', sans-serif;
      background: var(--background);
      color: var(--on-background);
      height: 100vh;
      overflow: hidden;
    }

    #homeScreen, #editorScreen { 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      position: relative; 
    }
    
    .home-header, .editor-header {
      background: var(--primary);
      color: var(--on-primary);
      padding: 20px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 16px; right: 16px;
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.2);
      border: none; border-radius: 50%;
      color: white; font-size: 1.4rem;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all var(--motion);
    }
    
    .theme-toggle:hover { 
      background: rgba(255,255,255,0.3); 
      transform: scale(1.1); 
    }
    
    [data-theme="light"] .theme-toggle { 
      background: rgba(0,0,0,0.15); 
      color: #121212; 
    }
    
    [data-theme="light"] .theme-toggle:hover { 
      background: rgba(0,0,0,0.25); 
    }

    .note-list { 
      flex: 1; 
      padding: 20px; 
      overflow-y: auto; 
    }
    
    .note-item { 
      background: var(--surface-container); 
      border-radius: var(--radius); 
      margin-bottom: 12px; 
      overflow: hidden; 
      position: relative; 
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
    }
    
    .note-content { 
      padding: 16px 20px; 
      background: var(--surface-container); 
      cursor: pointer; 
      position: relative; 
      z-index: 2; 
      transition: transform var(--motion); 
      font-weight: 500;
      flex: 1;
    }
    
    .note-title { 
      font-weight: 500; 
      font-size: 1.1rem; 
      color: var(--on-surface);
    }
    
    /* Delete background for swipe (mobile) */
    .delete-bg { 
      position: absolute; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0; 
      background: var(--danger); 
      display: flex; 
      align-items: center; 
      justify-content: flex-end; 
      padding-right: 24px; 
      color: var(--on-error); 
      font-size: 1.2rem; 
      z-index: 1; 
      transform: translateX(100%); 
      transition: transform var(--motion); 
    }
    
    /* Delete button for mouse/PC users */
    .delete-button {
      background: var(--danger);
      color: var(--on-error);
      border: none;
      width: 60px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: all var(--motion);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    
    .delete-button:hover {
      background: var(--error-container);
      color: var(--on-error-container);
      transform: scale(1.05);
    }
    
    /* Only show delete button on non-touch devices */
    @media (hover: hover) and (pointer: fine) {
      .delete-bg {
        display: none;
      }
      .note-item {
        padding-right: 0;
      }
    }
    
    /* Hide delete button on touch devices, keep swipe */
    @media (hover: none) and (pointer: coarse) {
      .delete-button {
        display: none;
      }
    }

    .empty-state { 
      text-align: center; 
      padding: 60px 20px; 
      color: var(--text-muted); 
    }
    
    .empty-state .material-icons { 
      font-size: 4rem; 
      margin-bottom: 16px; 
      opacity: 0.6; 
      color: var(--primary); 
    }

    #editorScreen { 
      display: none; 
      background: var(--background); 
    }
    
    .editor-header { 
      display: flex; 
      align-items: center; 
      gap: 16px; 
    }
    
    .back-btn { 
      background: none; 
      border: none; 
      color: var(--on-primary); 
      font-size: 1.5rem; 
      cursor: pointer; 
      padding: 8px; 
      border-radius: 50%; 
    }
    
    .back-btn:hover { 
      background: rgba(255,255,255,0.2); 
    }
    
    .editor-title-input { 
      background: transparent; 
      border: none; 
      color: var(--on-primary); 
      font-size: 1.3rem; 
      font-weight: 500; 
      flex: 1; 
      outline: none; 
    }

    .editor-content { 
      flex: 1; 
      margin: 20px; 
      background: var(--surface-container); 
      border-radius: var(--radius); 
      overflow: hidden; 
      box-shadow: inset 0 4px 16px rgba(0,0,0,0.1); 
      display: flex; 
      flex-direction: column; 
    }
    
    #noteInput { 
      flex: 1; 
      padding: 24px; 
      background: transparent; 
      border: none; 
      color: var(--on-surface); 
      font-size: 1.1rem; 
      line-height: 1.7; 
      resize: none; 
      outline: none; 
      font-family: inherit; 
      font-weight: 500; 
    }
    
    #livePreview { 
      flex: 1; 
      padding: 24px; 
      overflow-y: auto; 
      line-height: 1.7; 
      color: var(--on-surface); 
      display: none; 
      font-weight: 500; 
    }

    #livePreview * { 
      margin: 8px 0; 
    }
    
    #livePreview strong { 
      font-weight: 600; 
      color: var(--primary);
    }
    
    #livePreview em { 
      font-style: italic; 
    }
    
    #livePreview code { 
      background: var(--surface-container-high); 
      padding: 2px 6px; 
      border-radius: 4px; 
      font-family: monospace; 
      font-size: 0.95em; 
      color: var(--on-surface);
    }
    
    #livePreview a { 
      color: var(--primary); 
      text-decoration: underline; 
    }
    
    #livePreview ul, #livePreview ol { 
      padding-left: 24px; 
    }
    
    #livePreview h1 { 
      font-size: 1.6em; 
      margin: 16px 0 8px; 
      font-weight: 600; 
      color: var(--primary);
    }
    
    #livePreview h2 { 
      font-size: 1.4em; 
      margin: 16px 0 8px; 
      font-weight: 600; 
      color: var(--secondary);
    }

    .fab {
      position: fixed; bottom: 32px; right: 32px;
      width: 56px; height: 56px; background: var(--primary);
      color: var(--on-primary); border: none; border-radius: 50%;
      font-size: 1.5rem; cursor: pointer; box-shadow: var(--shadow);
      transition: all var(--motion);
    }
    
    .fab:hover { 
      transform: scale(1.1); 
      background: var(--primary-container);
      color: var(--on-primary-container);
    }

    @media (max-width: 768px) { 
      .fab { bottom: 16px; right: 16px; } 
      .note-list { padding: 16px; } 
    }
  </style>
</head>
<body data-theme="dark">

  <!-- HOME -->
  <div id="homeScreen">
    <div class="home-header">Endroid Notes</div>
    <button class="theme-toggle" id="themeToggle"><span class="material-icons">brightness_6</span></button>
    <div class="note-list" id="noteList">
      <div class="empty-state">
        <div class="material-icons">note_add</div>
        <div>No notes yet.<br>Tap + to create one.<br>Swipe left or click delete to remove</div>
      </div>
    </div>
    <button class="fab" id="addNoteBtn"><span class="material-icons">add</span></button>
  </div>

  <!-- EDITOR -->
  <div id="editorScreen">
    <div class="editor-header">
      <button class="back-btn" id="backBtn"><span class="material-icons">arrow_back</span></button>
      <input type="text" id="editorTitle" class="editor-title-input" placeholder="Untitled Note" />
    </div>
    <button class="theme-toggle" id="themeToggleEditor"><span class="material-icons">brightness_6</span></button>
    <div class="editor-content">
      <textarea id="noteInput" placeholder="Type your note here..."></textarea>
      <div id="livePreview"></div>
    </div>
  </div>

  <script>
    // DOM Elements
    const homeScreen = document.getElementById('homeScreen');
    const editorScreen = document.getElementById('editorScreen');
    const noteList = document.getElementById('noteList');
    const addBtn = document.getElementById('addNoteBtn');
    const backBtn = document.getElementById('backBtn');
    const editorTitle = document.getElementById('editorTitle');
    const noteInput = document.getElementById('noteInput');
    const livePreview = document.getElementById('livePreview');
    const themeToggle = document.getElementById('themeToggle');
    const themeToggleEditor = document.getElementById('themeToggleEditor');

    let notes = JSON.parse(localStorage.getItem('endroid-notes-v10')) || [];
    let currentNoteId = null;
    let touchStartX = 0;
    let isSwiping = false;

    // Check if device is touch-enabled
    const isTouchDevice = ('ontouchstart' in window) || 
                         (navigator.maxTouchPoints > 0) || 
                         (navigator.msMaxTouchPoints > 0);

    // Theme toggle
    function toggleTheme() {
      const isDark = document.body.dataset.theme === 'dark';
      document.body.dataset.theme = isDark ? 'light' : 'dark';
      localStorage.setItem('endroid-theme', document.body.dataset.theme);
    }
    themeToggle.addEventListener('click', toggleTheme);
    themeToggleEditor.addEventListener('click', toggleTheme);

    const saved = localStorage.getItem('endroid-theme');
    if (saved) document.body.dataset.theme = saved;

    // Update preview
    function updatePreview() {
      const text = noteInput.value;
      livePreview.textContent = text;
    }

    // Delete note function
    function deleteNote(index, element) {
      notes.splice(index, 1);
      localStorage.setItem('endroid-notes-v10', JSON.stringify(notes));
      if (element) {
        element.style.transition = 'all 0.3s';
        element.style.transform = 'translateX(-100%)';
        element.style.opacity = '0';
        setTimeout(() => renderHome(), 300);
      } else {
        renderHome();
      }
    }

    // Render Home Screen
    function renderHome() {
      noteList.innerHTML = '';
      
      if (!notes.length) {
        noteList.innerHTML = `<div class="empty-state"><div class="material-icons">note_add</div><div>No notes yet.<br>Tap + to create one.<br>Swipe left or click delete to remove</div></div>`;
        return;
      }

      notes.forEach((note, i) => {
        const item = document.createElement('div');
        item.className = 'note-item';
        
        // Different structure for touch vs mouse
        if (isTouchDevice) {
          // Touch device: Swipe to delete
          item.innerHTML = `
            <div class="delete-bg"><span class="material-icons">delete</span></div>
            <div class="note-content">
              <div class="note-title">${note.title || 'Untitled'}</div>
            </div>
          `;
        } else {
          // Mouse/PC: Delete button
          item.innerHTML = `
            <div class="note-content" style="flex: 1;">
              <div class="note-title">${note.title || 'Untitled'}</div>
            </div>
            <button class="delete-button" data-index="${i}" aria-label="Delete note">
              <span class="material-icons">delete</span>
            </button>
          `;
        }

        const content = item.querySelector('.note-content');
        
        if (isTouchDevice) {
          // Touch swipe logic
          const bg = item.querySelector('.delete-bg');

          content.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            isSwiping = true;
          });

          content.addEventListener('touchmove', e => {
            if (!isSwiping) return;
            const diff = touchStartX - e.touches[0].clientX;
            if (diff > 0) {
              content.style.transform = `translateX(-${Math.min(diff, 120)}px)`;
              bg.style.transform = `translateX(-${Math.min(diff, 120)}px)`;
            }
          });

          content.addEventListener('touchend', (e) => {
            const diff = touchStartX - (e.changedTouches?.[0]?.clientX || touchStartX);
            if (diff > 80) {
              deleteNote(i, item);
            } else {
              content.style.transform = '';
              bg.style.transform = '';
            }
            isSwiping = false;
          });
        } else {
          // Mouse: Delete button click
          const deleteBtn = item.querySelector('.delete-button');
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteNote(i, item);
          });
        }

        // Tap to open (works for both)
        content.addEventListener('click', (e) => {
          if (isTouchDevice) {
            if (Math.abs(touchStartX - (e.changedTouches?.[0]?.clientX || e.clientX)) < 10) {
              openEditor(i);
            }
          } else {
            openEditor(i);
          }
        });

        noteList.appendChild(item);
      });
    }

    // Open Editor
    function openEditor(id) {
      currentNoteId = id;
      const note = notes[id];
      editorTitle.value = note.title || '';
      noteInput.value = note.content || '';
      updatePreview();
      homeScreen.style.display = 'none';
      editorScreen.style.display = 'flex';
    }

    // Save and go back
    function saveAndBack() {
      if (currentNoteId !== null) {
        notes[currentNoteId] = { 
          title: editorTitle.value.trim() || 'Untitled', 
          content: noteInput.value 
        };
        localStorage.setItem('endroid-notes-v10', JSON.stringify(notes));
      }
      currentNoteId = null;
      editorScreen.style.display = 'none';
      homeScreen.style.display = 'flex';
      renderHome();
    }

    // Event Listeners
    addBtn.addEventListener('click', () => {
      notes.push({ title: 'New Note', content: '' });
      localStorage.setItem('endroid-notes-v10', JSON.stringify(notes));
      openEditor(notes.length - 1);
    });

    backBtn.addEventListener('click', saveAndBack);
    noteInput.addEventListener('input', updatePreview);
    editorTitle.addEventListener('input', updatePreview);

    // Keyboard shortcut: Save on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && editorScreen.style.display === 'flex') {
        saveAndBack();
      }
    });

    // Initialize
    renderHome();

    // Service Worker Registration
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("https://endroid.pages.dev/service-worker.js")
          .then(() => console.log("Service Worker registered"))
          .catch(err => console.error("SW registration failed:", err));
      });
    }
  </script>

</body>
      </html>
